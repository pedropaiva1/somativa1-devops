name: Docker Build and Push

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push image
        uses: docker/build-push-action@v5
        with:
          # Contexto na raiz para permitir o COPY das pastas .NET
          context: .
          # Caminho específico do Dockerfile
          file: ./FluentValidation.API/Dockerfile
          # Ativa o push automático após o build
          push: true
          # Tags: substitua 'seu-usuario' pelo seu login do Docker Hub
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/fluent-validation-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/fluent-validation-api:${{ github.sha }}
          # Otimização de Cache para builds futuros serem instantâneos
          cache-from: type=gha
          cache-to: type=gha,mode=max